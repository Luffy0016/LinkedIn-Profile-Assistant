<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LinkedIn Profile Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="title">LinkedIn Profile Assistant</div>

<div class="subtitle">
Turn your skills and experience into a compelling LinkedIn summary.
</div>

<textarea
id="profileInput"
placeholder="Example: Front-end developer with React and Tailwind. Built UI systems, led redesign projects, mentored juniors...">
</textarea>

<button id="generateButton">Generate Summary</button>

<div id="error" class="error"></div>

<div id="result" class="result" style="display:none"></div>

<div id="copyBtn" class="copy" style="display:none">Copy</div>

</div>

<script src="script.js"></script>

</body>
</html>
