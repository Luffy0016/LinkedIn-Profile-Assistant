 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkedIn Profile Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#060d1a;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:700px;
width:100%;
}

.title{
font-family:'Syne',sans-serif;
font-size:48px;
font-weight:800;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

textarea{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.3);
color:white;
font-size:15px;
min-height:160px;
}

button{
margin-top:20px;
padding:14px 28px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,#4f9eff,#a78bfa);
color:white;
font-size:15px;
cursor:pointer;
}

.result{
margin-top:30px;
padding:20px;
background:rgba(0,0,0,0.35);
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
line-height:1.7;
}

.copy{
margin-top:10px;
font-size:13px;
cursor:pointer;
color:#a78bfa;
}

.error{
color:#f87171;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">LinkedIn Profile Assistant</div>

<div class="subtitle">
Turn your skills and experience into a compelling LinkedIn summary.
</div>

<textarea id="profileInput"
placeholder="Example: Front-end developer with React and Tailwind. Built UI systems, led redesign projects, mentored juniors..."></textarea>

<button id="generateButton">Generate Summary</button>

<div id="error" class="error"></div>

<div id="result" class="result" style="display:none"></div>

<div id="copyBtn" class="copy" style="display:none">Copy</div>

</div>

<script>

const API_URL="https://api.anthropic.com/v1/messages"

const API_KEY="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"

const input=document.getElementById("profileInput")
const button=document.getElementById("generateButton")
const result=document.getElementById("result")
const error=document.getElementById("error")
const copy=document.getElementById("copyBtn")

async function generate(){

error.textContent=""
result.style.display="none"

const text=input.value.trim()

if(!text){
error.textContent="Please enter your experience first."
return
}

button.disabled=true
button.innerText="Generating..."

try{

const response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-api-key":API_KEY,
"anthropic-version":"2023-06-01",
"anthropic-dangerous-direct-browser-access":"true"
},
body:JSON.stringify({

model:"claude-3-sonnet-20240229",

max_tokens:400,

messages:[{
role:"user",
content:`You are an expert career coach.

Write a strong LinkedIn "About" summary based on the information below.

Rules:
- Maximum 3 paragraphs
- Maximum 220 words
- No bullet points
- Confident tone

User input:
${text}`
}]

})
})

const data=await response.json()

if(!response.ok){
throw new Error(data.error?.message || "API error")
}

const summary=data.content?.[0]?.text || "No response"

result.innerText=summary
result.style.display="block"
copy.style.display="block"

}catch(e){

error.textContent=e.message

}finally{

button.disabled=false
button.innerText="Generate Summary"

}

}

async function copyText(){

const text=result.innerText

await navigator.clipboard.writeText(text)

copy.innerText="Copied!"

setTimeout(()=>{
copy.innerText="Copy"
},2000)

}

button.addEventListener("click",generate)

copy.addEventListener("click",copyText)

input.addEventListener("keydown",(e)=>{
if((e.ctrlKey || e.metaKey) && e.key==="Enter"){
generate()
}
})

</script>

</body>
</html>
